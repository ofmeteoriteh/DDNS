name: Feature Request / 功能请求
description: Suggest a new feature or improvement / 建议新功能或改进
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion!
        感谢你的建议！

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve? / 你想解决什么问题？
      description: Describe the problem or use case. / 描述问题或使用场景。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution / 建议的方案
      description: How would you like it to work? / 你希望它怎么工作？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered / 考虑过的替代方案
      description: Any alternative solutions you've considered? / 有没有考虑过其他方案？

  - type: textarea
    id: context
    attributes:
      label: Additional context / 补充信息
      description: Any other context, screenshots, or references. / 其他上下文、截图或参考资料。
